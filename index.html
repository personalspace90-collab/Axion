<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion AI - Your Intelligent Companion</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .glass {
            background: rgba(30, 30, 35, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-strong {
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .message-bubble-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message-bubble-ai {
            background: rgba(50, 50, 60, 0.8);
        }
        
        .premium-gradient {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .otp-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        
        // API Configuration - Backend placeholders
        const API_BASE_URL = 'http://localhost:5000/api';
        const API_KEYS = {
            OPENAI: 'YOUR_OPENAI_API_KEY_HERE',
            ELEVEN_LABS: 'YOUR_ELEVEN_LABS_API_KEY_HERE',
            REPLICATE: 'YOUR_REPLICATE_API_KEY_HERE',
            STABILITY_AI: 'YOUR_STABILITY_API_KEY_HERE'
        };

        // Context for global state
        const AppContext = createContext();

        // Utility Components
        const Icon = ({ name, size = 24, className = "" }) => {
            const LucideIcon = window.lucideReact && window.lucideReact[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const baseStyle = "px-6 py-3 rounded-2xl font-medium transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white shadow-lg shadow-indigo-500/25",
                secondary: "glass text-white hover:bg-white/10",
                outline: "border border-white/20 hover:bg-white/5 text-white",
                premium: "premium-gradient text-white shadow-lg shadow-pink-500/25 hover:opacity-90",
                ghost: "hover:bg-white/5 text-gray-400 hover:text-white"
            };
            
            return (
                <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Input = ({ placeholder, value, onChange, type = "text", className = "", icon = null }) => (
            <div className="relative">
                {icon && <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">{icon}</div>}
                <input
                    type={type}
                    value={value}
                    onChange={onChange}
                    placeholder={placeholder}
                    className={`w-full bg-white/5 border border-white/10 rounded-2xl px-4 ${icon ? 'pl-12' : ''} py-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition-all ${className}`}
                />
            </div>
        );

        // Toast Notification Component
        const Toast = ({ message, type = 'info', onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, []);

            const icons = {
                success: 'CheckCircle',
                error: 'XCircle',
                info: 'Info',
                warning: 'AlertTriangle'
            };

            const colors = {
                success: 'bg-green-500/20 border-green-500/50 text-green-400',
                error: 'bg-red-500/20 border-red-500/50 text-red-400',
                info: 'bg-blue-500/20 border-blue-500/50 text-blue-400',
                warning: 'bg-yellow-500/20 border-yellow-500/50 text-yellow-400'
            };

            return (
                <div className={`fixed top-4 right-4 z-50 px-6 py-4 rounded-2xl border ${colors[type]} glass slide-in flex items-center gap-3`}>
                    <Icon name={icons[type]} size={20} />
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        // Premium Badge Component
        const PremiumBadge = () => (
            <span className="px-2 py-1 rounded-full text-xs font-bold bg-gradient-to-r from-pink-500 to-rose-500 text-white flex items-center gap-1">
                <Icon name="Crown" size={12} />
                PLUS
            </span>
        );

        // Auth Components
        const AuthScreen = ({ onLogin }) => {
            const [mode, setMode] = useState('welcome'); // welcome, login, register, otp, forgot
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [otp, setOtp] = useState(['', '', '', '', '', '']);
            const [agreed, setAgreed] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [countdown, setCountdown] = useState(30);
            const otpRefs = useRef([]);

            useEffect(() => {
                if (mode === 'otp' && countdown > 0) {
                    const timer = setTimeout(() => setCountdown(c => c - 1), 1000);
                    return () => clearTimeout(timer);
                }
            }, [mode, countdown]);

            const handleOtpChange = (index, value) => {
                if (value.length > 1) value = value[0];
                if (!/^\d*$/.test(value)) return;
                
                const newOtp = [...otp];
                newOtp[index] = value;
                setOtp(newOtp);
                
                if (value && index < 5) {
                    otpRefs.current[index + 1]?.focus();
                }
            };

            const handleOtpKeyDown = (index, e) => {
                if (e.key === 'Backspace' && !otp[index] && index > 0) {
                    otpRefs.current[index - 1]?.focus();
                }
            };

            const validatePassword = (pass) => {
                const checks = {
                    length: pass.length >= 8 && pass.length <= 30,
                    lower: /[a-z]/.test(pass),
                    upper: /[A-Z]/.test(pass),
                    number: /\d/.test(pass)
                };
                return checks;
            };

            const handleRegister = async () => {
                if (!email || !agreed) {
                    setError('Please fill all fields and agree to terms');
                    return;
                }
                setLoading(true);
                // Simulate API call
                setTimeout(() => {
                    setLoading(false);
                    setMode('otp');
                    setCountdown(30);
                }, 1500);
            };

            const handleVerifyOtp = async () => {
                const otpString = otp.join('');
                if (otpString.length !== 6) {
                    setError('Please enter complete OTP');
                    return;
                }
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    setMode('createPassword');
                }, 1500);
            };

            const handleCreatePassword = async () => {
                const checks = validatePassword(password);
                if (!Object.values(checks).every(Boolean)) {
                    setError('Password does not meet requirements');
                    return;
                }
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    onLogin({ email, isPremium: false, name: email.split('@')[0] });
                }, 1500);
            };

            const handleLogin = async () => {
                if (!email || !password) {
                    setError('Please fill all fields');
                    return;
                }
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    onLogin({ email, isPremium: false, name: email.split('@')[0] });
                }, 1500);
            };

            const PasswordCheck = ({ label, checked }) => (
                <div className="flex items-center gap-2 text-sm">
                    <div className={`w-5 h-5 rounded-full flex items-center justify-center ${checked ? 'bg-green-500' : 'bg-white/10'}`}>
                        <Icon name="Check" size={12} className={checked ? 'text-white' : 'text-gray-500'} />
                    </div>
                    <span className={checked ? 'text-white' : 'text-gray-500'}>{label}</span>
                </div>
            );

            if (mode === 'welcome') {
                return (
                    <div className="min-h-screen bg-black flex flex-col items-center justify-center p-6 relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-b from-indigo-900/20 to-transparent" />
                        
                        <div className="relative z-10 text-center space-y-8 max-w-md w-full">
                            <div className="w-24 h-24 mx-auto relative">
                                <div className="absolute inset-0 bg-indigo-500 rounded-3xl rotate-6 opacity-50 blur-xl" />
                                <div className="relative w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl flex items-center justify-center">
                                    <Icon name="Sparkles" size={48} className="text-white" />
                                </div>
                            </div>
                            
                            <div>
                                <h1 className="text-4xl font-bold mb-2">Axion AI</h1>
                                <p className="text-gray-400">Your Intelligent Companion</p>
                            </div>

                            <div className="space-y-3">
                                <Button onClick={() => setMode('register')} className="w-full">
                                    Get Started
                                </Button>
                                <Button variant="outline" onClick={() => setMode('login')} className="w-full">
                                    I already have an account
                                </Button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (mode === 'register') {
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <button onClick={() => setMode('welcome')} className="flex items-center gap-2 text-gray-400 hover:text-white mb-8">
                            <Icon name="ArrowLeft" size={20} />
                            Back
                        </button>

                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <div className="text-center space-y-2">
                                <h2 className="text-3xl font-bold">Create Account</h2>
                                <p className="text-gray-400">Start your journey with Axion</p>
                            </div>

                            {error && (
                                <div className="p-4 rounded-xl bg-red-500/20 border border-red-500/50 text-red-400 text-sm">
                                    {error}
                                </div>
                            )}

                            <div className="space-y-4">
                                <Input
                                    placeholder="Email address"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    icon={<Icon name="Mail" size={20} />}
                                />

                                <label className="flex items-start gap-3 p-4 rounded-2xl bg-white/5 border border-white/10 cursor-pointer hover:bg-white/10 transition-colors">
                                    <input
                                        type="checkbox"
                                        checked={agreed}
                                        onChange={(e) => setAgreed(e.target.checked)}
                                        className="mt-1 w-5 h-5 rounded border-white/20 bg-transparent text-indigo-500 focus:ring-indigo-500"
                                    />
                                    <span className="text-sm text-gray-400">
                                        I agree to the <span className="text-indigo-400">Terms of Service</span> and <span className="text-indigo-400">Privacy Policy</span>
                                    </span>
                                </label>

                                <Button onClick={handleRegister} disabled={loading} className="w-full">
                                    {loading ? 'Sending OTP...' : 'Continue'}
                                </Button>
                            </div>

                            <div className="relative">
                                <div className="absolute inset-0 flex items-center">
                                    <div className="w-full border-t border-white/10"></div>
                                </div>
                                <div className="relative flex justify-center text-sm">
                                    <span className="px-2 bg-black text-gray-500">Or continue with</span>
                                </div>
                            </div>

                            <div className="flex gap-3">
                                <Button variant="secondary" className="flex-1">
                                    <Icon name="Chrome" size={20} />
                                    Google
                                </Button>
                                <Button variant="secondary" className="flex-1">
                                    <Icon name="Send" size={20} />
                                    Telegram
                                </Button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (mode === 'otp') {
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <button onClick={() => setMode('register')} className="flex items-center gap-2 text-gray-400 hover:text-white mb-8">
                            <Icon name="ArrowLeft" size={20} />
                            Back
                        </button>

                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <div className="text-center space-y-2">
                                <div className="w-16 h-16 mx-auto bg-indigo-500/20 rounded-full flex items-center justify-center mb-4">
                                    <Icon name="ShieldCheck" size={32} className="text-indigo-400" />
                                </div>
                                <h2 className="text-3xl font-bold">Verify Email</h2>
                                <p className="text-gray-400">
                                    Code sent to <span className="text-white">{email}</span>
                                </p>
                            </div>

                            {error && (
                                <div className="p-4 rounded-xl bg-red-500/20 border border-red-500/50 text-red-400 text-sm">
                                    {error}
                                </div>
                            )}

                            <div className="flex justify-center gap-2">
                                {otp.map((digit, idx) => (
                                    <input
                                        key={idx}
                                        ref={el => otpRefs.current[idx] = el}
                                        type="text"
                                        value={digit}
                                        onChange={(e) => handleOtpChange(idx, e.target.value)}
                                        onKeyDown={(e) => handleOtpKeyDown(idx, e)}
                                        className="w-12 h-14 text-center text-2xl font-bold bg-white/5 border-2 border-white/10 rounded-xl focus:border-indigo-500 focus:outline-none text-white otp-input"
                                        maxLength={1}
                                    />
                                ))}
                            </div>

                            <Button onClick={handleVerifyOtp} disabled={loading} className="w-full">
                                {loading ? 'Verifying...' : 'Verify'}
                            </Button>

                            <div className="text-center space-y-2">
                                <p className="text-gray-400 text-sm">
                                    Didn't receive code?{' '}
                                    <button 
                                        disabled={countdown > 0}
                                        onClick={() => setCountdown(30)}
                                        className={`${countdown > 0 ? 'text-gray-600' : 'text-indigo-400 hover:text-indigo-300'}`}
                                    >
                                        Resend {countdown > 0 && `(${countdown}s)`}
                                    </button>
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            if (mode === 'createPassword') {
                const checks = validatePassword(password);
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <div className="text-center space-y-2">
                                <h2 className="text-3xl font-bold">Create Password</h2>
                                <p className="text-gray-400">Secure your account</p>
                            </div>

                            {error && (
                                <div className="p-4 rounded-xl bg-red-500/20 border border-red-500/50 text-red-400 text-sm">
                                    {error}
                                </div>
                            )}

                            <div className="space-y-4">
                                <Input
                                    type="password"
                                    placeholder="Create password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    icon={<Icon name="Lock" size={20} />}
                                />

                                <div className="space-y-2 p-4 rounded-2xl bg-white/5">
                                    <PasswordCheck label="8-30 characters" checked={checks.length} />
                                    <PasswordCheck label="At least one lowercase letter" checked={checks.lower} />
                                    <PasswordCheck label="At least one uppercase letter" checked={checks.upper} />
                                    <PasswordCheck label="At least one number" checked={checks.number} />
                                </div>

                                <Button 
                                    onClick={handleCreatePassword} 
                                    disabled={loading || !Object.values(checks).every(Boolean)} 
                                    className="w-full"
                                >
                                    {loading ? 'Creating Account...' : 'Complete Registration'}
                                </Button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (mode === 'login') {
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <button onClick={() => setMode('welcome')} className="flex items-center gap-2 text-gray-400 hover:text-white mb-8">
                            <Icon name="ArrowLeft" size={20} />
                            Back
                        </button>

                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <div className="text-center space-y-2">
                                <h2 className="text-3xl font-bold">Welcome Back</h2>
                                <p className="text-gray-400">Sign in to continue</p>
                            </div>

                            {error && (
                                <div className="p-4 rounded-xl bg-red-500/20 border border-red-500/50 text-red-400 text-sm">
                                    {error}
                                </div>
                            )}

                            <div className="space-y-4">
                                <Input
                                    placeholder="Email address"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    icon={<Icon name="Mail" size={20} />}
                                />

                                <Input
                                    type="password"
                                    placeholder="Password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    icon={<Icon name="Lock" size={20} />}
                                />

                                <div className="flex justify-end">
                                    <button onClick={() => setMode('forgot')} className="text-sm text-indigo-400 hover:text-indigo-300">
                                        Forgot password?
                                    </button>
                                </div>

                                <Button onClick={handleLogin} disabled={loading} className="w-full">
                                    {loading ? 'Signing in...' : 'Sign In'}
                                </Button>
                            </div>

                            <p className="text-center text-gray-400 text-sm">
                                Don't have an account?{' '}
                                <button onClick={() => setMode('register')} className="text-indigo-400 hover:text-indigo-300">
                                    Sign up
                                </button>
                            </p>
                        </div>
                    </div>
                );
            }

            if (mode === 'forgot') {
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <button onClick={() => setMode('login')} className="flex items-center gap-2 text-gray-400 hover:text-white mb-8">
                            <Icon name="ArrowLeft" size={20} />
                            Back
                        </button>

                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <div className="text-center space-y-2">
                                <h2 className="text-3xl font-bold">Reset Password</h2>
                                <p className="text-gray-400">Enter your email to receive reset code</p>
                            </div>

                            <div className="space-y-4">
                                <Input
                                    placeholder="Email address"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    icon={<Icon name="Mail" size={20} />}
                                />

                                <Button onClick={() => { setMode('otp'); setCountdown(30); }} className="w-full">
                                    Send Reset Code
                                </Button>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        // Sidebar Component
        const Sidebar = ({ isOpen, onClose, user, onNavigate, currentView, chats, onNewChat, onSelectChat }) => {
            const menuItems = [
                { id: 'chat', label: 'New Chat', icon: 'MessageSquarePlus', shortcut: '⌘N' },
                { id: 'tasks', label: 'Tasks', icon: 'CheckSquare' },
                { id: 'images', label: 'Images', icon: 'Image' },
                { id: 'audio', label: 'Audio', icon: 'Headphones' },
                { id: 'video', label: 'Video', icon: 'Video' },
                { id: 'novel', label: 'Novel Writing', icon: 'BookOpen' },
                { id: 'divider1', divider: true },
                { id: 'upgrade', label: 'Upgrade', icon: 'Crown', premium: true },
                { id: 'sessions', label: 'Sessions', icon: 'History' },
                { id: 'settings', label: 'Settings', icon: 'Settings' },
                { id: 'admin', label: 'Admin', icon: 'Shield', adminOnly: true },
                { id: 'divider2', divider: true },
                { id: 'logout', label: 'Log Out', icon: 'LogOut', danger: true },
            ];

            const recentChats = chats.slice(0, 5);

            return (
                <>
                    {isOpen && (
                        <div 
                            className="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden"
                            onClick={onClose}
                        />
                    )}
                    
                    <div className={`fixed left-0 top-0 h-full w-80 glass-strong z-50 transform transition-transform duration-300 ${isOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 lg:static border-r border-white/10 flex flex-col`}>
                        <div className="p-4 border-b border-white/10 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                                    <Icon name="Sparkles" size={20} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="font-bold text-lg">Axion AI</h1>
                                    {user?.isPremium && <PremiumBadge />}
                                </div>
                            </div>
                            <button onClick={onClose} className="lg:hidden p-2 hover:bg-white/10 rounded-lg">
                                <Icon name="X" size={20} />
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-3 space-y-1 scrollbar-hide">
                            {menuItems.map((item) => {
                                if (item.divider) return <div key={item.id} className="my-3 border-t border-white/10" />;
                                if (item.adminOnly && !user?.isAdmin) return null;
                                
                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => {
                                            if (item.id === 'chat') onNewChat();

                    <div className="h-16 border-b border-white/10 flex items-center px-6 glass sticky top-0">
                        <h2 className="text-xl font-bold flex items-center gap-2">
                            <Icon name="Crown" size={24} className="text-pink-400" />
                            Upgrade to Plus
                        </h2>
                    </div>

                    <div className="p-6 max-w-4xl mx-auto w-full">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl font-bold mb-4">Unlock the Full Power of Axion</h1>
                            <p className="text-gray-400 text-lg">Get unlimited access to all AI features</p>
                        </div>

                        <div className="grid md:grid-cols-2 gap-8 mb-12">
                            <div className="glass rounded-3xl p-8 border border-white/10">
                                <h3 className="text-xl font-semibold mb-2">Free</h3>
                                <p className="text-gray-400 mb-6">Current plan</p>
                                <div className="text-3xl font-bold mb-6">$0<span className="text-lg text-gray-500">/month</span></div>
                                <ul className="space-y-3 mb-8">
                                    {features.map((f, i) => (
                                        <li key={i} className="flex items-center gap-3 text-gray-400">
                                            <Icon name="X" size={16} className="text-gray-600" />
                                            <span className="text-sm">{f.free}</span>
                                        </li>
                                    ))}
                                </ul>
                                <Button variant="secondary" className="w-full" disabled>
                                    Current Plan
                                </Button>
                            </div>

                            <div className="glass rounded-3xl p-8 border-2 border-pink-500/50 relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-gradient-to-l from-pink-500 to-rose-500 text-white text-xs font-bold px-4 py-1 rounded-bl-xl">
                                    RECOMMENDED
                                </div>
                                <h3 className="text-xl font-semibold mb-2 text-pink-400">Axion Plus</h3>
                                <p className="text-gray-400 mb-6">Unlimited everything</p>
                                <div className="text-3xl font-bold mb-2">$10.99<span className="text-lg text-gray-500">/month</span></div>
                                <p className="text-sm text-gray-500 mb-6">Cancel anytime</p>
                                <ul className="space-y-3 mb-8">
                                    {features.map((f, i) => (
                                        <li key={i} className="flex items-center gap-3">
                                            <div className="w-5 h-5 rounded-full bg-pink-500/20 flex items-center justify-center">
                                                <Icon name="Check" size={12} className="text-pink-400" />
                                            </div>
                                            <span className="text-sm">{f.text}</span>
                                        </li>
                                    ))}
                                </ul>
                                <Button variant="premium" onClick={onUpgrade} className="w-full">
                                    Upgrade Now
                                </Button>
                            </div>
                        </div>

                        <div className="text-center text-sm text-gray-500">
                            <p>Secure payment powered by Stripe. 30-day money-back guarantee.</p>
                        </div>
                    </div>
                </div>
            );
        };

        // Settings Page
        const SettingsPage = ({ user, onUpdateUser, onLogout }) => {
            const [activeSection, setActiveSection] = useState('personalization');
            const [settings, setSettings] = useState({
                name: user?.name || '',
                email: user?.email || '',
                theme: 'dark',
                parentalControl: false,
                accent: 'indigo',
                notifications: true,
            });

            const sections = [
                { id: 'personalization', label: 'Personalization', icon: 'User' },
                { id: 'appearance', label: 'Appearance', icon: 'Palette' },
                { id: 'privacy', label: 'Privacy & Safety', icon: 'Shield' },
                { id: 'apps', label: 'Apps', icon: 'Grid' },
                { id: 'about', label: 'About', icon: 'Info' },
            ];

            const accents = [
                { id: 'indigo', color: 'bg-indigo-500', name: 'Indigo' },
                { id: 'rose', color: 'bg-rose-500', name: 'Rose' },
                { id: 'emerald', color: 'bg-emerald-500', name: 'Emerald' },
                { id: 'amber', color: 'bg-amber-500', name: 'Amber' },
                { id: 'cyan', color: 'bg-cyan-500', name: 'Cyan' },
            ];

            const saveSettings = () => {
                onUpdateUser({ ...user, ...settings });
                // Show toast
            };

            return (
                <div className="flex-1 flex flex-col h-full">
                    <div className="h-16 border-b border-white/10 flex items-center px-6 glass">
                        <h2 className="text-xl font-bold">Settings</h2>
                    </div>

                    <div className="flex-1 flex overflow-hidden">
                        <div className="w-64 border-r border-white/10 hidden sm:block overflow-y-auto">
                            {sections.map((section) => (
                                <button
                                    key={section.id}
                                    onClick={() => setActiveSection(section.id)}
                                    className={`w-full flex items-center gap-3 px-6 py-4 text-left transition-colors ${
                                        activeSection === section.id 
                                            ? 'bg-white/10 text-white border-r-2 border-indigo-500' 
                                            : 'text-gray-400 hover:bg-white/5 hover:text-white'
                                    }`}
                                >
                                    <Icon name={section.icon} size={20} />
                                    {section.label}
                                </button>
                            ))}
                        </div>

                        <div className="flex-1 overflow-y-auto p-6">
                            <div className="max-w-2xl mx-auto">
                                {activeSection === 'personalization' && (
                                    <div className="space-y-6">
                                        <h3 className="text-lg font-semibold mb-4">Personal Information</h3>
                                        
                                        <div className="glass rounded-2xl p-6 space-y-4">
                                            <div className="flex items-center gap-4 mb-6">
                                                <div className="w-20 h-20 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-2xl font-bold">
                                                    {settings.name[0]?.toUpperCase()}
                                                </div>
                                                <Button variant="secondary" size="sm">
                                                    Change Photo
                                                </Button>
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium mb-2">Display Name</label>
                                                <Input 
                                                    value={settings.name}
                                                    onChange={(e) => setSettings({...settings, name: e.target.value})}
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-sm font-medium mb-2">Email</label>
                                                <Input 
                                                    value={settings.email}
                                                    onChange={(e) => setSettings({...settings, email: e.target.value})}
                                                />
                                            </div>

                                            <Button onClick={saveSettings}>Save Changes</Button>
                                        </div>

                                        <div className="glass rounded-2xl p-6">
                                            <h4 className="font-medium mb-4">Account Actions</h4>
                                            <div className="space-y-2">
                                                <button className="w-full text-left p-3 rounded-xl hover:bg-white/5 text-red-400 flex items-center gap-3">
                                                    <Icon name="Trash2" size={18} />
                                                    Delete Account
                                                </button>
                                                <button 
                                                    onClick={onLogout}
                                                    className="w-full text-left p-3 rounded-xl hover:bg-white/5 text-gray-400 flex items-center gap-3"
                                                >
                                                    <Icon name="LogOut" size={18} />
                                                    Log Out
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeSection === 'appearance' && (
                                    <div className="space-y-6">
                                        <h3 className="text-lg font-semibold mb-4">Appearance</h3>
                                        
                                        <div className="glass rounded-2xl p-6 space-y-6">
                                            <div>
                                                <label className="block text-sm font-medium mb-3">Theme</label>
                                                <div className="flex gap-3">
                                                    <button 
                                                        onClick={() => setSettings({...settings, theme: 'dark'})}
                                                        className={`flex-1 p-4 rounded-xl border-2 transition-all ${
                                                            settings.theme === 'dark' ? 'border-indigo-500 bg-white/10' : 'border-white/10'
                                                        }`}
                                                    >
                                                        <Icon name="Moon" size={24} className="mx-auto mb-2" />
                                                        <span className="text-sm">Dark</span>
                                                    </button>
                                                    <button 
                                                        onClick={() => setSettings({...settings, theme: 'light'})}
                                                        className={`flex-1 p-4 rounded-xl border-2 transition-all ${
                                                            settings.theme === 'light' ? 'border-indigo-500 bg-white/10' : 'border-white/10'
                                                        }`}
                                                    >
                                                        <Icon name="Sun" size={24} className="mx-auto mb-2" />
                                                        <span className="text-sm">Light</span>
                                                    </button>
                                                </div>
                                            </div>

                                            <div>
                                                <div className="flex items-center justify-between mb-3">
                                                    <label className="block text-sm font-medium">Accent Color</label>
                                                    {!user?.isPremium && (
                                                        <span className="text-xs text-pink-400 flex items-center gap-1">
                                                            <Icon name="Lock" size={12} />
                                                            Plus only
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="flex flex-wrap gap-3">
                                                    {accents.map((accent) => (
                                                        <button
                                                            key={accent.id}
                                                            disabled={!user?.isPremium && accent.id !== 'indigo'}
                                                            onClick={() => user?.isPremium && setSettings({...settings, accent: accent.id})}
                                                            className={`w-12 h-12 rounded-full ${accent.color} flex items-center justify-center transition-all ${
                                                                settings.accent === accent.id ? 'ring-2 ring-white ring-offset-2 ring-offset-black' : 'opacity-50 hover:opacity-100'
                                                            } ${!user?.isPremium && accent.id !== 'indigo' ? 'cursor-not-allowed' : ''}`}
                                                        >
                                                            {settings.accent === accent.id && <Icon name="Check" size={20} className="text-white" />}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeSection === 'privacy' && (
                                    <div className="space-y-6">
                                        <h3 className="text-lg font-semibold mb-4">Privacy & Safety</h3>
                                        
                                        <div className="glass rounded-2xl p-6 space-y-4">
                                            <div className="flex items-center justify-between py-3 border-b border-white/10">
                                                <div>
                                                    <p className="font-medium">Parental Controls</p>
                                                    <p className="text-sm text-gray-400">Filter sensitive content in responses</p>
                                                </div>
                                                <button 
                                                    onClick={() => setSettings({...settings, parentalControl: !settings.parentalControl})}
                                                    className={`w-14 h-8 rounded-full transition-colors relative ${settings.parentalControl ? 'bg-indigo-500' : 'bg-white/20'}`}
                                                >
                                                    <div className={`absolute top-1 w-6 h-6 rounded-full bg-white transition-transform ${settings.parentalControl ? 'translate-x-7' : 'translate-x-1'}`} />
                                                </button>
                                            </div>

                                            <div className="flex items-center justify-between py-3">
                                                <div>
                                                    <p className="font-medium">Chat History</p>
                                                    <p className="text-sm text-gray-400">Clear all conversation history</p>
                                                </div>
                                                <Button variant="secondary" size="sm">
                                                    Clear History
                                                </Button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeSection === 'apps' && (
                                    <div className="space-y-6">
                                        <h3 className="text-lg font-semibold mb-4">Our Apps</h3>
                                        <div className="glass rounded-2xl p-8 text-center">
                                            <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-white/5 flex items-center justify-center">
                                                <Icon name="Smartphone" size={32} className="text-gray-400" />
                                            </div>
                                            <h4 className="font-semibold mb-2">More Apps Coming Soon</h4>
                                            <p className="text-sm text-gray-400">We're working on new experiences for you.</p>
                                        </div>
                                    </div>
                                )}

                                {activeSection === 'about' && (
                                    <div className="space-y-6">
                                        <h3 className="text-lg font-semibold mb-4">About Axion</h3>
                                        <div className="glass rounded-2xl p-6 space-y-4">
                                            <div className="flex items-center gap-4 mb-6">
                                                <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                                                    <Icon name="Sparkles" size={32} className="text-white" />
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-xl">Axion AI</h4>
                                                    <p className="text-sm text-gray-400">Version 1.0.0</p>
                                                </div>
                                            </div>
                                            
                                            <div className="space-y-2">
                                                <button className="w-full text-left p-3 rounded-xl hover:bg-white/5 flex items-center justify-between">
                                                    <span>Terms of Service</span>
                                                    <Icon name="ExternalLink" size={16} className="text-gray-400" />
                                                </button>
                                                <button className="w-full text-left p-3 rounded-xl hover:bg-white/5 flex items-center justify-between">
                                                    <span>Privacy Policy</span>
                                                    <Icon name="ExternalLink" size={16} className="text-gray-400" />
                                                </button>
                                                <button 
                                                    onClick={() => window.open('https://wa.me/', '_blank')}
                                                    className="w-full text-left p-3 rounded-xl hover:bg-white/5 flex items-center justify-between text-red-400"
                                                >
                                                    <span>Report a Bug</span>
                                                    <Icon name="Bug" size={16} />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Main App Component
        const AxionApp = () => {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('chat');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isPrivate, setIsPrivate] = useState(false);
            const [attachMenuOpen, setAttachMenuOpen] = useState(false);
            const [voiceRecorderOpen, setVoiceRecorderOpen] = useState(false);
            const [callOpen, setCallOpen] = useState(false);
            const [chats, setChats] = useState([]);
            const [toast, setToast] = useState(null);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [usageLimits, setUsageLimits] = useState({
                messages: 25,
                images: 4,
                videos: 3
            });

            // Check online status
            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // Load user from localStorage
            useEffect(() => {
                const savedUser = localStorage.getItem('axion_user');
                if (savedUser) {
                    setUser(JSON.parse(savedUser));
                }
            }, []);

            // Save user to localStorage
            useEffect(() => {
                if (user) {
                    localStorage.setItem('axion_user', JSON.stringify(user));
                }
            }, [user]);

            const handleLogin = (userData) => {
                setUser(userData);
                showToast('Welcome to Axion AI!', 'success');
            };

            const showToast = (message, type = 'info') => {
                setToast({ message, type });
            };

            const handleSendMessage = async (text = inputValue) => {
                if (!text.trim() || !isOnline) return;
                
                if (!user?.isPremium && usageLimits.messages <= 0) {
                    showToast('Daily message limit reached. Upgrade to Plus.', 'warning');
                    return;
                }

                const newMessage = {
                    text,
                    isUser: true,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    id: Date.now()
                };

                setMessages(prev => [...prev, newMessage]);
                setInputValue('');
                setIsTyping(true);

                if (!user?.isPremium) {
                    setUsageLimits(prev => ({ ...prev, messages: prev.messages - 1 }));
                }

                // Simulate AI response
                setTimeout(() => {
                    const aiResponse = {
                        text: `I understand you're asking about "${text}". This is a simulated response. In production, this would connect to your AI backend API.`,
                        isUser: false,
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        id: Date.now() + 1
                    };
                    setMessages(prev => [...prev, aiResponse]);
                    setIsTyping(false);
                }, 1500);
            };

            const handleNewChat = () => {
                if (messages.length > 0) {
                    const title = messages[0].text.slice(0, 30) + '...';
                    setChats(prev => [{ id: Date.now(), title, date: new Date() }, ...prev]);
                }
                setMessages([]);
                setCurrentView('chat');
            };

            const handleAttachSelect = (type) => {
                setAttachMenuOpen(false);
                
                const attachMessages = {
                    camera: 'Camera functionality would open here',
                    photo: 'Photo library would open here',
                    file: 'File picker would open here',
                    think: 'Deep thinking mode activated',
                    research: 'Research mode activated',
                    shopping: 'Shopping research mode activated',
                    study: 'Study mode activated',
                    quiz: 'Quiz mode activated'
                };

                if (attachMessages[type]) {
                    handleSendMessage(`[${type}] ${attachMessages[type]}`);
                }
            };

            const handleVoiceSend = (audioBlob) => {
                handleSendMessage('[Voice Message] Audio transcription would appear here');
            };

            const handleUpgrade = () => {
                // Simulate payment
                setTimeout(() => {
                    setUser({ ...user, isPremium: true });
                    setUsageLimits({ messages: Infinity, images: Infinity, videos: Infinity });
                    showToast('Welcome to Axion Plus!', 'success');
                    setCurrentView('chat');
                }, 1500);
            };

            if (!user) {
                return <AuthScreen onLogin={handleLogin} />;
            }

            if (!isOnline) {
                return (
                    <div className="min-h-screen bg-black flex items-center justify-center p-6">
                        <div className="text-center space-y-4">
                            <div className="w-20 h-20 mx-auto rounded-full bg-red-500/20 flex items-center justify-center">
                                <Icon name="WifiOff" size={32} className="text-red-400" />
                            </div>
                            <h2 className="text-2xl font-bold">Axion is disconnected</h2>
                            <p className="text-gray-400">Please check your internet connection and try again.</p>
                            <Button onClick={() => window.location.reload()} variant="secondary">
                                Retry Connection
                            </Button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-black flex overflow-hidden">
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                    
                    <Sidebar 
                        isOpen={sidebarOpen} 
                        onClose={() => setSidebarOpen(false)}
                        user={user}
                        onNavigate={setCurrentView}
                        currentView={currentView}
                        chats={chats}
                        onNewChat={handleNewChat}
                        onSelectChat={(chat) => {
                            handleNewChat();
                            // Load chat logic here
                        }}
                    />

                    <div className="flex-1 flex flex-col min-w-0">
                        {currentView === 'chat' && (
                            <ChatInterface
                                messages={messages}
                                onSendMessage={handleSendMessage}
                                inputValue={inputValue}
                                setInputValue={setInputValue}
                                isTyping={isTyping}
                                isPrivate={isPrivate}
                                setIsPrivate={setIsPrivate}
                                user={user}
                                onOpenAttachMenu={() => setAttachMenuOpen(true)}
                                onStartVoice={() => setVoiceRecorderOpen(true)}
                                onStartCall={() => setCallOpen(true)}
                                onNavigate={setCurrentView}
                                usageLimits={usageLimits}
                            />
                        )}

                        {currentView === 'images' && (
                            <ImageGeneration user={user} onNotify={showToast} />
                        )}

                        {currentView === 'video' && (
                            <VideoGeneration user={user} onNotify={showToast} />
                        )}

                        {currentView === 'audio' && (
                            <AudioStudio user={user} onNotify={showToast} />
                        )}

                        {currentView === 'novel' && (
                            <NovelWriting onNotify={showToast} />
                        )}

                        {currentView === 'tasks' && (
                            <TasksPage user={user} isAdmin={user?.isAdmin} />
                        )}

                        {currentView === 'upgrade' && (
                            <UpgradePage user={user} onUpgrade={handleUpgrade} />
                        )}

                        {currentView === 'settings' && (
                            <SettingsPage 
                                user={user} 
                                onUpdateUser={setUser}
                                onLogout={() => {
                                    localStorage.removeItem('axion_user');
                                    setUser(null);
                                }}
                            />
                        )}

                        {/* Mobile menu button */}
                        <button 
                            onClick={() => setSidebarOpen(true)}
                            className="lg:hidden fixed top-4 left-4 z-30 p-2 glass rounded-xl"
                        >
                            <Icon name="Menu" size={20} />
                        </button>
                    </div>

                    <AttachMenu 
                        isOpen={attachMenuOpen} 
                        onClose={() => setAttachMenuOpen(false)}
                        onSelect={handleAttachSelect}
                    />

                    <VoiceRecorder
                        isOpen={voiceRecorderOpen}
                        onClose={() => setVoiceRecorderOpen(false)}
                        onSend={handleVoiceSend}
                    />

                    <CallInterface
                        isOpen={callOpen}
                        onClose={() => setCallOpen(false)}
                    />
                </div>
            );
        };

        // Render app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AxionApp />);
    </script>
</body>
</html>
