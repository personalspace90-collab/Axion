<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axion AI - Production Code</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 30, 35, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-strong { background: rgba(20, 20, 25, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .message-bubble-user { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .message-bubble-ai { background: rgba(50, 50, 60, 0.8); }
        .premium-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Utility Components
        const Icon = ({ name, size = 24, className = "" }) => {
            const LucideIcon = window.lucide.icons[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const baseStyle = "px-6 py-3 rounded-2xl font-medium transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-50";
            const variants = {
                primary: "bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white",
                secondary: "glass text-white hover:bg-white/10",
                premium: "premium-gradient text-white hover:opacity-90"
            };
            return <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const Input = ({ placeholder, value, onChange, type = "text", className = "", icon = null }) => (
            <div className="relative">
                {icon && <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">{icon}</div>}
                <input type={type} value={value} onChange={onChange} placeholder={placeholder} 
                    className={`w-full bg-white/5 border border-white/10 rounded-2xl px-4 ${icon ? 'pl-12' : ''} py-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition-all ${className}`} />
            </div>
        );

        // Authentication Screen
        const AuthScreen = ({ onLogin }) => {
            const [mode, setMode] = useState('welcome');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [otp, setOtp] = useState(['', '', '', '', '', '']);
            const [agreed, setAgreed] = useState(false);
            const [loading, setLoading] = useState(false);
            const otpRefs = useRef([]);

            const handleOtpChange = (index, value) => {
                if (!/^\d*$/.test(value)) return;
                const newOtp = [...otp];
                newOtp[index] = value[0] || '';
                setOtp(newOtp);
                if (value && index < 5) otpRefs.current[index + 1]?.focus();
            };

            const validatePassword = (pass) => ({
                length: pass.length >= 8 && pass.length <= 30,
                lower: /[a-z]/.test(pass),
                upper: /[A-Z]/.test(pass),
                number: /\d/.test(pass)
            });

            if (mode === 'welcome') {
                return (
                    <div className="min-h-screen bg-black flex flex-col items-center justify-center p-6">
                        <div className="w-24 h-24 mx-auto mb-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl flex items-center justify-center">
                            <Icon name="Sparkles" size={48} className="text-white" />
                        </div>
                        <h1 className="text-4xl font-bold mb-2">Axion AI</h1>
                        <p className="text-gray-400 mb-8">Your Intelligent Companion</p>
                        <div className="space-y-3 w-full max-w-sm">
                            <Button onClick={() => setMode('register')} className="w-full">Get Started</Button>
                            <Button variant="secondary" onClick={() => setMode('login')} className="w-full">I already have an account</Button>
                        </div>
                    </div>
                );
            }

            if (mode === 'register') {
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <button onClick={() => setMode('welcome')} className="flex items-center gap-2 text-gray-400 mb-8">
                            <Icon name="ArrowLeft" size={20} /> Back
                        </button>
                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <h2 className="text-3xl font-bold text-center">Create Account</h2>
                            <Input placeholder="Email address" value={email} onChange={(e) => setEmail(e.target.value)} icon={<Icon name="Mail" size={20} />} />
                            <label className="flex items-start gap-3 p-4 rounded-2xl bg-white/5 border border-white/10 cursor-pointer">
                                <input type="checkbox" checked={agreed} onChange={(e) => setAgreed(e.target.checked)} className="mt-1 w-5 h-5 rounded bg-transparent text-indigo-500" />
                                <span className="text-sm text-gray-400">I agree to the Terms of Service and Privacy Policy</span>
                            </label>
                            <Button onClick={() => { setLoading(true); setTimeout(() => { setLoading(false); setMode('otp'); }, 1000); }} disabled={!email || !agreed || loading} className="w-full">
                                {loading ? 'Sending...' : 'Continue'}
                            </Button>
                        </div>
                    </div>
                );
            }

            if (mode === 'otp') {
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <button onClick={() => setMode('register')} className="flex items-center gap-2 text-gray-400 mb-8"><Icon name="ArrowLeft" size={20} /> Back</button>
                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <h2 className="text-3xl font-bold text-center">Verify Email</h2>
                            <p className="text-center text-gray-400">Code sent to {email}</p>
                            <div className="flex justify-center gap-2">
                                {otp.map((digit, idx) => (
                                    <input key={idx} ref={el => otpRefs.current[idx] = el} type="text" value={digit} onChange={(e) => handleOtpChange(idx, e.target.value)} 
                                        className="w-12 h-14 text-center text-2xl font-bold bg-white/5 border-2 border-white/10 rounded-xl focus:border-indigo-500 focus:outline-none text-white" maxLength={1} />
                                ))}
                            </div>
                            <Button onClick={() => setMode('createPassword')} className="w-full">Verify</Button>
                        </div>
                    </div>
                );
            }

            if (mode === 'createPassword') {
                const checks = validatePassword(password);
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <h2 className="text-3xl font-bold text-center">Create Password</h2>
                            <Input type="password" placeholder="Create password" value={password} onChange={(e) => setPassword(e.target.value)} icon={<Icon name="Lock" size={20} />} />
                            <div className="space-y-2 p-4 rounded-2xl bg-white/5">
                                {Object.entries({length: '8-30 characters', lower: 'One lowercase', upper: 'One uppercase', number: 'One number'}).map(([key, label]) => (
                                    <div key={key} className="flex items-center gap-2 text-sm">
                                        <Icon name="Check" size={16} className={checks[key] ? 'text-green-400' : 'text-gray-600'} />
                                        <span className={checks[key] ? 'text-white' : 'text-gray-500'}>{label}</span>
                                    </div>
                                ))}
                            </div>
                            <Button onClick={() => onLogin({ email, isPremium: false, name: email.split('@')[0] })} disabled={!Object.values(checks).every(Boolean)} className="w-full">
                                Complete
                            </Button>
                        </div>
                    </div>
                );
            }

            if (mode === 'login') {
                return (
                    <div className="min-h-screen bg-black flex flex-col p-6">
                        <button onClick={() => setMode('welcome')} className="flex items-center gap-2 text-gray-400 mb-8"><Icon name="ArrowLeft" size={20} /> Back</button>
                        <div className="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
                            <h2 className="text-3xl font-bold text-center">Welcome Back</h2>
                            <Input placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} icon={<Icon name="Mail" size={20} />} />
                            <Input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} icon={<Icon name="Lock" size={20} />} />
                            <Button onClick={() => onLogin({ email, isPremium: false, name: email.split('@')[0] })} className="w-full">Sign In</Button>
                            <p className="text-center text-gray-400 text-sm">Don't have an account? <button onClick={() => setMode('register')} className="text-indigo-400">Sign up</button></p>
                        </div>
                    </div>
                );
            }
            return null;
        };

        // Sidebar Navigation
        const Sidebar = ({ isOpen, onClose, user, onNavigate, currentView, onNewChat }) => {
            const menuItems = [
                { id: 'chat', label: 'New Chat', icon: 'MessageSquarePlus', action: onNewChat },
                { id: 'images', label: 'Images', icon: 'Image' },
                { id: 'video', label: 'Video', icon: 'Video' },
                { id: 'audio', label: 'Audio', icon: 'Headphones' },
                { id: 'novel', label: 'Novel', icon: 'BookOpen' },
                { id: 'tasks', label: 'Tasks', icon: 'CheckSquare' },
                { id: 'upgrade', label: 'Upgrade', icon: 'Crown', premium: true },
                { id: 'settings', label: 'Settings', icon: 'Settings' },
                { id: 'logout', label: 'Log Out', icon: 'LogOut', danger: true },
            ];

            return (
                <>
                    {isOpen && <div className="fixed inset-0 bg-black/60 z-40 lg:hidden" onClick={onClose} />}
                    <div className={`fixed left-0 top-0 h-full w-80 glass-strong z-50 transform transition-transform duration-300 ${isOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 border-r border-white/10 flex flex-col`}>
                        <div className="p-4 border-b border-white/10 flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                                <Icon name="Sparkles" size={20} className="text-white" />
                            </div>
                            <div>
                                <h1 className="font-bold">Axion AI</h1>
                                {user?.isPremium && <span className="text-xs bg-gradient-to-r from-pink-500 to-rose-500 text-white px-2 py-0.5 rounded-full">PLUS</span>}
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 space-y-1">
                            {menuItems.map((item) => (
                                <button key={item.id} onClick={() => { item.action ? item.action() : onNavigate(item.id); onClose(); }}
                                    className={`w-full flex items-center gap-3 p-3 rounded-xl transition-colors ${currentView === item.id ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'} ${item.danger ? 'hover:bg-red-500/20 hover:text-red-400' : ''}`}>
                                    <Icon name={item.icon} size={20} className={item.premium ? 'text-pink-400' : ''} />
                                    <span>{item.label}</span>
                                    {item.premium && !user?.isPremium && <Icon name="Lock" size={14} className="ml-auto text-pink-400" />}
                                </button>
                            ))}
                        </div>
                        <div className="p-4 border-t border-white/10">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center font-bold">
                                    {user?.name?.[0]?.toUpperCase()}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="font-medium text-sm truncate">{user?.name}</p>
                                    <p className="text-xs text-gray-500 truncate">{user?.email}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </>
            );
        };

        // Main Chat Interface
        const ChatInterface = ({ messages, onSendMessage, inputValue, setInputValue, isTyping, isPrivate, setIsPrivate, user, onOpenAttach, onStartVoice, onStartCall }) => {
            const messagesEndRef = useRef(null);
            useEffect(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), [messages, isTyping]);

            return (
                <div className="flex-1 flex flex-col h-full">
                    <div className="h-16 border-b border-white/10 flex items-center justify-between px-4 glass">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                                <Icon name="Sparkles" size={16} className="text-white" />
                            </div>
                            <div>
                                <h2 className="font-semibold">Axion</h2>
                                <div className="flex items-center gap-1 text-xs text-green-400"><div className="w-2 h-2 bg-green-400 rounded-full animate-pulse" /> Online</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            {!user?.isPremium && (
                                <button className="px-3 py-1.5 rounded-full bg-gradient-to-r from-pink-500 to-rose-500 text-xs font-medium text-white flex items-center gap-1">
                                    <Icon name="Crown" size={12} /> Get Plus
                                </button>
                            )}
                            <button onClick={() => setIsPrivate(!isPrivate)} className={`p-2 rounded-xl ${isPrivate ? 'bg-indigo-500/20 text-indigo-400' : 'text-gray-400 hover:bg-white/5'}`}>
                                <Icon name={isPrivate ? "ShieldCheck" : "Shield"} size={20} />
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                        {messages.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-center space-y-6 opacity-50">
                                <Icon name="Sparkles" size={64} className="text-indigo-400" />
                                <div>
                                    <h3 className="text-2xl font-bold mb-2">How can I help you today?</h3>
                                    <p className="text-gray-400">Start a conversation with Axion AI</p>
                                </div>
                            </div>
                        ) : (
                            messages.map((msg, idx) => (
                                <div key={idx} className={`flex ${msg.isUser ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] p-4 rounded-2xl ${msg.isUser ? 'message-bubble-user rounded-br-md' : 'message-bubble-ai rounded-bl-md border border-white/10'}`}>
                                        <p>{msg.text}</p>
                                    </div>
                                </div>
                            ))
                        )}
                        {isTyping && (
                            <div className="flex justify-start">
                                <div className="message-bubble-ai p-4 rounded-2xl rounded-bl-md border border-white/10 flex gap-1">
                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" />
                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0.1s'}} />
                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}} />
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    <div className="p-4 border-t border-white/10 glass">
                        <div className="max-w-4xl mx-auto flex items-end gap-2 bg-white/5 border border-white/10 rounded-3xl p-2 focus-within:border-indigo-500/50">
                            <button onClick={onOpenAttach} className="p-3 hover:bg-white/10 rounded-full text-gray-400 hover:text-white"><Icon name="Plus" size={20} /></button>
                            <textarea value={inputValue} onChange={(e) => setInputValue(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSendMessage(); }}}
                                placeholder="Ask Axion anything..." className="flex-1 bg-transparent border-none outline-none text-white placeholder-gray-500 resize-none py-3 max-h-32 min-h-[48px]" rows={1} />
                            <button onClick={onStartVoice} className="p-3 hover:bg-white/10 rounded-full text-gray-400 hover:text-white"><Icon name="Mic" size={20} /></button>
                            <button onClick={onStartCall} className="p-3 hover:bg-white/10 rounded-full text-gray-400 hover:text-white"><Icon name="Phone" size={20} /></button>
                            <button onClick={() => onSendMessage()} disabled={!inputValue.trim()} className="p-3 bg-indigo-500 hover:bg-indigo-600 disabled:opacity-50 rounded-full text-white"><Icon name="Send" size={20} /></button>
                        </div>
                    </div>
                </div>
            );
        };

        // Attachment Menu Modal
        const AttachMenu = ({ isOpen, onClose, onSelect }) => {
            if (!isOpen) return null;
            const options = [
                { id: 'camera', label: 'Camera', icon: 'Camera' },
                { id: 'photo', label: 'Photos', icon: 'Image' },
                { id: 'file', label: 'Files', icon: 'FileUp' },
                { id: 'think', label: 'Think Harder', icon: 'Brain', premium: true },
                { id: 'research', label: 'Research', icon: 'Search', premium: true },
                { id: 'study', label: 'Study', icon: 'GraduationCap', premium: true },
            ];
            return (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 p-4" onClick={onClose}>
                    <div className="w-full max-w-lg glass-strong rounded-3xl p-4 fade-in" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-semibold">Add Attachment</h3>
                            <button onClick={onClose}><Icon name="X" size={20} /></button>
                        </div>
                        <div className="grid grid-cols-3 gap-3">
                            {options.map(opt => (
                                <button key={opt.id} onClick={() => onSelect(opt.id)} className="p-4 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 text-center">
                                    <Icon name={opt.icon} size={24} className="mx-auto mb-2 text-indigo-400" />
                                    <span className="text-xs">{opt.label}</span>
                                    {opt.premium && <Icon name="Lock" size={12} className="mx-auto mt-1 text-pink-400" />}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Voice Recorder Modal
        const VoiceRecorder = ({ isOpen, onClose, onSend }) => {
            const [recording, setRecording] = useState(false);
            const [duration, setDuration] = useState(0);
            useEffect(() => { let i; if (recording) i = setInterval(() => setDuration(d => d + 1), 1000); return () => clearInterval(i); }, [recording]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80">
                    <div className="glass-strong rounded-3xl p-8 text-center space-y-6">
                        <button onClick={() => setRecording(!recording)} className={`w-24 h-24 rounded-full flex items-center justify-center ${recording ? 'bg-red-500 animate-pulse' : 'bg-indigo-500'}`}>
                            <Icon name={recording ? "Square" : "Mic"} size={32} className="text-white" />
                        </button>
                        <p className="text-2xl font-mono">{Math.floor(duration / 60)}:{(duration % 60).toString().padStart(2, '0')}</p>
                        <div className="flex gap-3">
                            <Button variant="secondary" onClick={onClose}>Cancel</Button>
                            <Button onClick={() => { onSend(); onClose(); }} disabled={!recording}>Send</Button>
                        </div>
                    </div>
                </div>
            );
        };

        // Premium Upgrade Page
        const UpgradePage = ({ onUpgrade }) => (
            <div className="flex-1 overflow-y-auto p-6">
                <div className="max-w-4xl mx-auto text-center">
                    <h1 className="text-4xl font-bold mb-4">Unlock Axion Plus</h1>
                    <div className="grid md:grid-cols-2 gap-8 mt-8">
                        <div className="glass rounded-3xl p-8">
                            <h3 className="text-xl font-semibold mb-2">Free</h3>
                            <p className="text-3xl font-bold mb-6">$0<span className="text-lg text-gray-500">/mo</span></p>
                            <ul className="text-left space-y-2 text-gray-400 mb-8 text-sm">
                                <li>• 25 messages/day</li>
                                <li>• 4 images/day</li>
                                <li>• 3 videos/day</li>
                                <li>• 1080p quality</li>
                            </ul>
                            <Button variant="secondary" className="w-full" disabled>Current</Button>
                        </div>
                        <div className="glass rounded-3xl p-8 border-2 border-pink-500/50 relative">
                            <div className="absolute top-0 right-0 bg-pink-500 text-white text-xs font-bold px-4 py-1 rounded-bl-xl">BEST</div>
                            <h3 className="text-xl font-semibold mb-2 text-pink-400">Plus</h3>
                            <p className="text-3xl font-bold mb-6">$10.99<span className="text-lg text-gray-500">/mo</span></p>
                            <ul className="text-left space-y-2 mb-8 text-sm">
                                <li>• Unlimited everything</li>
                                <li>• 4K video quality</li>
                                <li>• Voice cloning</li>
                                <li>• Custom accents</li>
                                <li>• Priority support</li>
                            </ul>
                            <Button variant="premium" onClick={onUpgrade} className="w-full">Upgrade Now</Button>
                        </div>
                    </div>
                </div>
            </div>
        );

        // Settings Page
        const SettingsPage = ({ user, onUpdate, onLogout }) => {
            const [section, setSection] = useState('profile');
            return (
                <div className="flex-1 flex flex-col h-full">
                    <div className="h-16 border-b border-white/10 flex items-center px-6"><h2 className="text-xl font-bold">Settings</h2></div>
                    <div className="flex-1 flex overflow-hidden">
                        <div className="w-64 border-r border-white/10 hidden sm:block">
                            {['profile', 'appearance', 'privacy'].map(s => (
                                <button key={s} onClick={() => setSection(s)} className={`w-full text-left px-6 py-4 capitalize ${section === s ? 'bg-white/10 border-r-2 border-indigo-500' : 'text-gray-400 hover:bg-white/5'}`}>{s}</button>
                            ))}
                        </div>
                        <div className="flex-1 overflow-y-auto p-6">
                            {section === 'profile' && (
                                <div className="max-w-md space-y-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-20 h-20 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-2xl font-bold">{user?.name?.[0]}</div>
                                        <Button variant="secondary" size="sm">Change Photo</Button>
                                    </div>
                                    <Input placeholder="Name" value={user?.name} onChange={(e) => onUpdate({...user, name: e.target.value})} />
                                    <Input placeholder="Email" value={user?.email} />
                                    <Button onClick={() => onUpdate(user)}>Save Changes</Button>
                                    <button onClick={onLogout} className="w-full text-left p-3 text-red-400 hover:bg-red-500/10 rounded-xl flex items-center gap-2">
                                        <Icon name="LogOut" size={18} /> Log Out
                                    </button>
                                </div>
                            )}
                            {section === 'appearance' && (
                                <div className="max-w-md space-y-6">
                                    <h3 className="font-semibold">Theme</h3>
                                    <div className="flex gap-3">
                                        <div className="flex-1 p-4 rounded-xl bg-white/10 border-2 border-indigo-500 text-center"><Icon name="Moon" size={24} className="mx-auto mb-2" /> Dark</div>
                                        <div className="flex-1 p-4 rounded-xl bg-white/5 border-2 border-white/10 text-center opacity-50"><Icon name="Sun" size={24} className="mx-auto mb-2" /> Light</div>
                                    </div>
                                </div>
                            )}
                            {section === 'privacy' && (
                                <div className="max-w-md space-y-4">
                                    <div className="flex items-center justify-between p-4 glass rounded-xl">
                                        <div><p className="font-medium">Parental Controls</p><p className="text-sm text-gray-400">Filter sensitive content</p></div>
                                        <div className="w-12 h-6 bg-indigo-500 rounded-full relative"><div className="absolute right-1 top-1 w-4 h-4 bg-white rounded-full" /></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Main Application Component
        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('chat');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [typing, setTyping] = useState(false);
            const [isPrivate, setIsPrivate] = useState(false);
            const [attachOpen, setAttachOpen] = useState(false);
            const [voiceOpen, setVoiceOpen] = useState(false);
            const [chats, setChats] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('axion_user');
                if (saved) setUser(JSON.parse(saved));
            }, []);

            useEffect(() => { if (user) localStorage.setItem('axion_user', JSON.stringify(user)); }, [user]);

            const handleSend = (text = input) => {
                if (!text.trim()) return;
                setMessages(prev => [...prev, { text, isUser: true, time: new Date().toLocaleTimeString() }]);
                setInput('');
                setTyping(true);
                setTimeout(() => {
                    setMessages(prev => [...prev, { text: "This is Axion's response to: " + text, isUser: false, time: new Date().toLocaleTimeString() }]);
                    setTyping(false);
                }, 1000);
            };

            const newChat = () => {
                if (messages.length) setChats(prev => [{ id: Date.now(), title: messages[0].text.slice(0, 30) + '...', date: new Date() }, ...prev]);
                setMessages([]);
                setView('chat');
            };

            if (!user) return <AuthScreen onLogin={setUser} />;

            return (
                <div className="h-screen bg-black flex overflow-hidden">
                    <Sidebar isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} user={user} onNavigate={setView} currentView={view} onNewChat={newChat} />
                    <div className="flex-1 flex flex-col min-w-0">
                        {view === 'chat' && <ChatInterface messages={messages} onSendMessage={handleSend} inputValue={input} setInputValue={setInput} isTyping={typing} isPrivate={isPrivate} setIsPrivate={setIsPrivate} user={user} onOpenAttach={() => setAttachOpen(true)} onStartVoice={() => setVoiceOpen(true)} onStartCall={() => alert('Call feature - Add WebRTC API here')} />}
                        {view === 'upgrade' && <UpgradePage onUpgrade={() => setUser({...user, isPremium: true})} />}
                        {view === 'settings' && <SettingsPage user={user} onUpdate={setUser} onLogout={() => { localStorage.removeItem('axion_user'); setUser(null); }} />}
                        {view === 'images' && <div className="flex-1 flex items-center justify-center text-gray-400">Image Generation - Add Stable Diffusion API</div>}
                        {view === 'video' && <div className="flex-1 flex items-center justify-center text-gray-400">Video Generation - Add Runway API</div>}
                        {view === 'audio' && <div className="flex-1 flex items-center justify-center text-gray-400">Audio Studio - Add ElevenLabs API</div>}
                        {view === 'novel' && <div className="flex-1 flex items-center justify-center text-gray-400">Novel Writing - Add GPT-4 API</div>}
                        {view === 'tasks' && <div className="flex-1 flex items-center justify-center text-gray-400">Tasks System - Connect to backend</div>}
                        <button onClick={() => setSidebarOpen(true)} className="lg:hidden fixed top-4 left-4 z-30 p-2 glass rounded-xl"><Icon name="Menu" size={20} /></button>
                    </div>
                    <AttachMenu isOpen={attachOpen} onClose={() => setAttachOpen(false)} onSelect={(type) => { handleSend(`[${type}] Attachment`); setAttachOpen(false); }} />
                    <VoiceRecorder isOpen={voiceOpen} onClose={() => setVoiceOpen(false)} onSend={() => handleSend('[Voice Message]')} />
                </div>
            );
        };

        // Initialize Application
        window.lucide.createIcons();
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
